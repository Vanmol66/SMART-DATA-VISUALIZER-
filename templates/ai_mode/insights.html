{% extends "ai_mode/base.html" %}
{% block content %}

<h2 style="margin-bottom:8px;">🔍 AI Insights</h2>
<p style="color:#64748b;margin-bottom:24px;">AI-generated analysis of your dataset</p>

<div class="ai-card" style="max-width:900px;margin:0 auto;">
  <div class="formatted-response" style="line-height:1.8;color:#cbd5e1;">
    {{ html_insights | safe }}

</div>

<div style="text-align:center;margin-top:32px;">
  <a href="/ai/chat" class="ai-btn-primary">💬 Ask Follow-up Questions</a>

</div>

{% endblock %}
