{% extends "ai_mode/base.html" %}
{% block content %}

<style>

.ai-card{
    background: linear-gradient(
        145deg,
        rgba(15,23,42,0.98),
        rgba(17,24,39,0.95)
    );
    border:1px solid rgba(56,189,248,0.25);
    border-radius:22px;
    padding:40px;
    box-shadow:
        0 0 30px rgba(56,189,248,0.08),
        0 0 70px rgba(168,85,247,0.05);
}

/* MAIN CONTENT */
.formatted-response{
    color:#f8fafc !important;
    font-size:18px;
    line-height:2;
    font-weight:500;
}

/* FORCE ALL TEXT */
.formatted-response *{
    color:#f8fafc !important;
}

/* MAIN TITLES */
.formatted-response h1,
.formatted-response h2{
    color:#38bdf8 !important;
    font-size:32px !important;
    font-weight:900 !important;
    margin-top:35px;
    margin-bottom:20px;
    text-shadow:0 0 15px rgba(56,189,248,0.4);
}

/* SUB TITLES */
.formatted-response h3,
.formatted-response h4,
.formatted-response strong{
    color:#f472b6 !important;
    font-size:24px;
    font-weight:800;
}

/* BULLETS */
.formatted-response li{
    margin-bottom:12px;
    color:#e2e8f0 !important;
}

/* INLINE CODE */
.formatted-response code{
    background:rgba(59,130,246,0.22);
    color:#38bdf8 !important;
    padding:4px 10px;
    border-radius:7px;
    font-size:14px;
    font-weight:700;
}

/* PARAGRAPH */
.formatted-response p{
    color:#e2e8f0 !important;
    margin-bottom:16px;
}

/* SPECIAL EMOJI HEADINGS */
.formatted-response p:first-letter{
    color:#facc15;
}

/* CUSTOM SECTION GLOW */
.section-title{
    color:#38bdf8;
    font-size:34px;
    font-weight:900;
    margin-bottom:12px;
    text-shadow:0 0 18px rgba(56,189,248,0.4);
}

.sub-text{
    color:#cbd5e1;
    font-size:16px;
    margin-bottom:28px;
}

</style>

<div style="max-width:1100px;margin:auto;padding:20px;">

    <div class="section-title">
        🔍 AI Insights
    </div>

    <div class="sub-text">
        AI-generated analysis of your dataset
    </div>

    <div class="ai-card">
        <div class="formatted-response">
            {{ html_insights | safe }}
        </div>
    </div>

    <div style="text-align:center;margin-top:40px;">

        <a href="/ai/chat"
           style="
           background:#2563eb;
           color:white;
           padding:14px 28px;
           border-radius:12px;
           text-decoration:none;
           font-weight:700;
           margin-right:14px;
           box-shadow:0 0 20px rgba(37,99,235,0.3);
           ">
           💬 Ask Follow-up Questions
        </a>

        <a href="/ai/report"
           style="
           background:transparent;
           border:1px solid #38bdf8;
           color:#38bdf8;
           padding:14px 28px;
           border-radius:12px;
           text-decoration:none;
           font-weight:700;
           ">
           📄 Generate Report
        </a>

    </div>

</div>

{% endblock %}
