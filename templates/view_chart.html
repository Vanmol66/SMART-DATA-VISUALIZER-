{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="breadcrumb">
    <a href="/home">Home</a><span>›</span>
    <a href="{{ url_for('charts', filename=filename) }}">{{ filename }}</a><span>›</span>
    <span>Chart</span>
  </div>
  <h2>{{ title }}</h2>
</div>

<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
  <a class="btn btn-ghost btn-sm" href="{{ url_for('charts', filename=filename) }}">← Charts</a>
  <a class="btn btn-ghost btn-sm" href="{{ url_for('analysis', filename=filename) }}">Analysis</a>
</div>

<div class="card anim">
  <div class="card-body p-lg">
    <div class="chart-preview">{{ chart_div | safe }}</div>
  </div>
</div>

{% endblock %}
