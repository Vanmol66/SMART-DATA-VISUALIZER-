{% extends "base.html" %}
{% block content %}

<div class="login-wrap" style="min-height:auto;padding:32px 0;">
  <div class="login-card card">
    <div class="card-body" style="padding:32px 28px;">
      <div style="text-align:center;margin-bottom:24px;">
        <img src="{{ url_for('static', filename='avatars/avatar1.png') }}"
             class="avatar" alt="Preview" id="av" style="margin-bottom:12px;">
        <h3 style="margin-bottom:4px;">Create Profile</h3>
        <p>Personalize your DataForge experience</p>
      </div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Avatar</label>
          <select name="avatar" class="form-select" onchange="document.getElementById('av').src='/static/avatars/'+this.value">
            <option value="avatar1.png">🌌 Void</option>
            <option value="avatar2.png">🌸 Aurora</option>
            <option value="avatar3.png">🌿 Forest</option>
            <option value="avatar4.png">🔥 Inferno</option>
            <option value="avatar5.png">❄️ Polar</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Display Name</label>
          <input type="text" name="name" placeholder="Your name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="number" name="age" placeholder="Your age" class="form-control" min="10" max="120">
        </div>
        <div class="mb-4">
          <label class="form-label">Role</label>
          <select name="work" class="form-select">
            <option>Student</option>
            <option>Corporate</option>
            <option>Researcher</option>
            <option>Others</option>
          </select>
        </div>
        <button class="btn btn-primary btn-w" type="submit">Create Profile →</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
