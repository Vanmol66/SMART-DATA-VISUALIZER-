{% extends "base.html" %}
{% block content %}

<div class="glass mx-auto text-center" style="max-width:400px;">

    <img src="{{ url_for('static', filename='avatars/avatar1.png') }}" class="avatar mb-3">

    <h3>Create Profile</h3>

    <form method="POST">

        <select name="avatar" class="form-control mb-3">
            <option value="avatar1.png">Avatar 1</option>
            <option value="avatar2.png">Avatar 2</option>
            <option value="avatar3.png">Avatar 3</option>
            <option value="avatar4.png">Avatar 4</option>
            <option value="avatar5.png">Avatar 5</option>
        </select>

        <input type="text" name="name" placeholder="Name" class="form-control mb-2">
        <input type="number" name="age" placeholder="Age" class="form-control mb-2">

        <select name="work" class="form-control mb-3">
            <option>Student</option>
            <option>Corporate</option>
            <option>Others</option>
        </select>

        <button class="btn btn-primary w-100">Create Profile</button>
    </form>

</div>

{% endblock %}
